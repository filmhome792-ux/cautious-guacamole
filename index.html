<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Film Home</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:sans-serif; }
        header {
            display:flex; justify-content:space-between; align-items:center;
            padding:15px 20px; background:linear-gradient(to bottom,rgba(0,0,0,.9),transparent);
            position:fixed; width:100%; z-index:10; box-sizing:border-box;
        }
        .logo { font-size:22px; font-weight:bold; color:#e50914; }
        nav a { margin-left:12px; color:#fff; text-decoration:none; font-size:13px; }
        .search-box { margin-top:70px; padding:10px 20px; }
        .search-input { width:100%; padding:12px; border-radius:6px; border:none; font-size:14px; }
        .hero {
            height:50vh; background:url('https://picsum.photos/800/500?random=1') center/cover no-repeat;
            position:relative; display:flex; align-items:flex-end; padding:20px; box-sizing:border-box;
        }
        .hero-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.2)); }
        .hero-content { position:relative; max-width:90%; }
        .hero-title { font-size:26px; margin-bottom:8px; }
        .hero-desc { font-size:13px; color:#ddd; margin-bottom:15px; }
        .btn { padding:8px 14px; border:none; border-radius:4px; font-weight:bold; cursor:pointer; margin-left:6px; font-size:12px; }
        .btn-play { background:#fff; color:#000; }
        .btn-more { background:rgba(109,109,110,.7); color:#fff; }
        .section { padding:10px 10px 20px; background:#000; }
        .row-title { font-size:15px; margin:10px 0; }
        .row { display:flex; overflow-x:auto; gap:8px; }
        .card { min-width:120px; height:170px; background:#222; border-radius:4px; overflow:hidden; flex-shrink:0; cursor:pointer; }
        .card img { width:100%; height:100%; object-fit:cover; }
    </style>
</head>
<body>

<header>
    <div class="logo">Film Home</div>
    <nav>
        <a href="#">خانه</a>
        <a href="admin.html">مدیریت</a>
    </nav>
</header>

<div class="search-box">
    <input type="text" id="search" class="search-input" placeholder="جستجوی فیلم...">
</div>

<main>
    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">فیلم ویژه امشب</h1>
            <p class="hero-desc">اینجا می‌تونی خلاصه جذاب فیلم رو بنویسی.</p>
            <button class="btn btn-play" onclick="goToPlayer()">▶ تماشا</button>
            <button class="btn btn-more" onclick="goToDetails()">ℹ اطلاعات بیشتر</button>
        </div>
    </section>

    <div class="section">
        <h2 class="row-title">فیلم‌ها</h2>
        <div class="row" id="movieRow"></div>
    </div>
</main>

<script>
    let movies = JSON.parse(localStorage.getItem("movies")) || [];

    const row = document.getElementById("movieRow");

    function loadMovies() {
        row.innerHTML = "";
        movies.forEach((movie, index) => {
            row.innerHTML += `
                <div class="card" data-title="${movie.title}" onclick="openMovie(${index})">
                    <img src="${movie.image}">
                </div>
            `;
        });
    }

    function openMovie(index) {
        localStorage.setItem("currentMovieIndex", index);
        location.href = "movie.html";
    }

    function goToDetails() {
        if (movies.length === 0) return alert("هنوز فیلمی اضافه نشده");
        localStorage.setItem("currentMovieIndex", 0);
        location.href = "movie.html";
    }

    function goToPlayer() {
        if (movies.length === 0) return alert("هنوز فیلمی اضافه نشده");
        localStorage.setItem("currentMovieIndex", 0);
        location.href = "player.html";
    }

    loadMovies();

    const searchInput = document.getElementById("search");
    searchInput.addEventListener("input", function () {
        const value = this.value.toLowerCase();
        const cards = document.querySelectorAll(".card");
        cards.forEach(card => {
            const title = card.getAttribute("data-title").toLowerCase();
            card.style.display = title.includes(value) ? "block" : "none";
        });
    });
</script>

</body>
</html>
